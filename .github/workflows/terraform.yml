name: Terraform

on:
  pull_request:
    paths:
      - '**/*.tf'
      - '.github/workflows/**'
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # AWS_DEPLOY_ROLE_ARN is the output of module.github_actions_oidc
      # (modules/github-actions-oidc). That module's own first apply has to
      # be run manually by someone with AWS admin credentials (chicken-egg:
      # CI can't create the role that lets CI authenticate) - see its ARN
      # output, then add it as a repo secret. Until that secret exists this
      # step - and everything after it - will fail, same as before.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: sa-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.4

      - name: Terraform fmt
        run: terraform fmt -check

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: TFLint
        run: |
          curl -sSL https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
          tflint --call-module-type=all

      - name: Checkov
        run: |
          python -m pip install checkov
          checkov -d .
